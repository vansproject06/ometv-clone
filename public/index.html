<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>MeetMegle</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
</head>

<body>

    <div id="startScreen">

    <button id="startBtn">START</button>

    <div id="loader" class="spinner" style="display:none;"></div>

</div>

<h2 id="status">Waiting for partner...</h2>

<div id="loading"></div>

<h3 id="onlineCount">0 users online</h3>

<div id="chatContainer">

    <div id="chatMessages"></div>

    <div id="chatInputArea">

        <input type="text" id="chatInput" placeholder="Type message...">

        <button id="sendBtn">Send</button>

    </div>

</div>

    <button id="nextBtn"><i class="fa-solid fa-forward"></i></button>

    <button id="stopBtn"><i class="fa-solid fa-phone-slash"></i></button>

   <button id="cameraBtn"><i class="fa-solid fa-camera-rotate"></i>
</button>

<button id="muteBtn"><i class="fa-solid fa-microphone"></i>
</button>

   <video id="remoteVideo" autoplay playsinline></video>

<video id="localVideo" autoplay muted playsinline></video>

<audio id="connectSound" src="connect.mp3"></audio>

<audio id="disconnectSound" src="disconnect.mp3"></audio>

<script src="app.js"></script>

</body>
</html>
